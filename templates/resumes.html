<!DOCTYPE html>
<html>
<head>
    <title>Parsed Resumes</title>
    <style>
        body{
            font-family: Arial;
            margin:40px;
        }
        table{
            border-collapse: collapse;
            width:100%;
        }
        th, td{
            border:1px solid #ccc;
            padding:10px;
            text-align:left;
        }
        th{
            background:#f4f4f4;
        }
    </style>
</head>

<body>

<h2>Parsed Resume Data</h2>

<table>
<tr>
<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Phone</th>
<th>Summary</th>
</tr>

{% for resume in resumes %}

<tr>
<td>{{ resume[0] }}</td>
<td>{{ resume[1] }}</td>
<td>{{ resume[2] }}</td>
<td>{{ resume[3] }}</td>
<td>{{ resume[4] }}</td>
</tr>

{% endfor %}

</table>

</body>
</html>
